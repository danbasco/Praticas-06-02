# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
image: 
  python:latest  # this sets default image for jobs

stages:
  - test
  - validate

semgrep-sast:
  stage: test
  artifacts:
    name: sast
    paths:
      - gl-sast-report.json
    reports:
      sast: gl-sast-report.json
    when: always

check-sast-report:
  stage: validate
  script:
    - echo "Validando o relatório SAST..."
    - |
      python -c "
      import json
      
      # Lendo o relatório
      with open('gl-sast-report.json') as f:
          report = json.load(f)
      
      # Obtendo as vulnerabilidades
      vulnerabilities = report.get('vulnerabilities', [])
      
      if vulnerabilities:
          print(f'\n== Relatório de Vulnerabilidades ({len(vulnerabilities)} encontradas) ==')
          for vuln in vulnerabilities:
              name = vuln.get('name', 'Sem nome')
              description = vuln.get('description', 'Sem descrição').replace('\n', ' ')
              file = vuln.get('location', {}).get('file', 'Arquivo não especificado')
              start_line = vuln.get('location', {}).get('start_line', 'Início desconhecido')
              end_line = vuln.get('location', {}).get('end_line', 'Fim desconhecido')
              severity = vuln.get('severity', 'Severidade não especificada')
              
              print(f'\n- Nome: {name}')
              print(f'  Severidade: {severity}')
              print(f'  Descrição: {description}')
              print(f'  Arquivo: {file}')
              print(f'  Linhas: {start_line}-{end_line}')
          
          exit(1)
      else:
          print('Nenhuma vulnerabilidade encontrada.')
      "
  dependencies:
    - semgrep-sast
  allow_failure: false

include:
- template: Security/SAST.gitlab-ci.yml